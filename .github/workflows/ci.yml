name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Paraglide
        run: npx paraglide-js compile --project ./project.inlang

      - name: Lint
        run: pnpm lint

      - name: Check
        run: pnpm check
        env:
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET || 'dummy_secret' }}
          PUBLIC_CONTACT_EMAIL: ${{ secrets.PUBLIC_CONTACT_EMAIL || 'dummy@example.com' }}

      - name: Unit Tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build
        env:
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET || 'dummy_secret' }}
          PUBLIC_CONTACT_EMAIL: ${{ secrets.PUBLIC_CONTACT_EMAIL || 'dummy@example.com' }}

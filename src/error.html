<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Terjadi Kesalahan - Mikeu Portfolio</title>
		<style>
			:root {
				--bg: #ffffff;
				--card-from: #f9fafb; /* gray-50 */
				--card-to: #ffffff;
				--text: #0f172a;
				--muted: #64748b;
				--destructive: #ef4444;
				--border: #e2e8f0;
				--primary: #0f172a;
				--primary-foreground: #ffffff;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--bg: #020617;
					--card-from: #0f172a; /* gray-900 */
					--card-to: #020617; /* background */
					--text: #f8fafc;
					--muted: #94a3b8;
					--border: #1e293b;
					--primary: #f8fafc;
					--primary-foreground: #0f172a;
				}
			}
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
				background-color: var(--bg);
				color: var(--text);
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				margin: 0;
				padding: 1rem;
			}
			.card {
				width: 100%;
				max-width: 48rem; /* max-w-3xl */
				background: linear-gradient(to bottom, var(--card-from), var(--card-to));
				border-radius: 0.75rem;
				padding: 3rem 2rem;
				text-align: center;
				box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
			}
			.status {
				font-size: 1.875rem; /* text-3xl */
				font-weight: 700;
				color: var(--destructive);
				margin: 0;
			}
			.description {
				font-size: 1.125rem; /* text-lg */
				margin-top: 0.5rem;
				font-weight: 500;
			}
			.content {
				padding: 2rem 0;
			}
			.illustration {
				width: 200px;
				height: 200px;
				margin: 0 auto 1.5rem;
				color: var(--muted);
				opacity: 0.5;
			}
			.error-message {
				color: var(--muted);
				font-size: 1rem;
				max-width: 32rem;
				margin: 0 auto;
				line-height: 1.5;
			}
			.footer {
				margin-top: 2rem;
			}
			.btn {
				display: inline-block;
				background-color: var(--primary);
				color: var(--primary-foreground);
				padding: 0.625rem 1.25rem;
				border-radius: 0.5rem;
				text-decoration: none;
				font-weight: 600;
				font-size: 0.875rem;
				transition: opacity 0.2s;
			}
			.btn:hover {
				opacity: 0.9;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h1 class="status">%sveltekit.status%</h1>
			<p class="description">Terjadi Kesalahan</p>

			<div class="content">
				<!-- SVG Replacement for Lottie -->
				<svg
					class="illustration"
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke="currentColor"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						stroke-width="1.5"
						d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
					/>
				</svg>
				<p class="error-message">%sveltekit.error.message%</p>
			</div>

			<div class="footer">
				<a href="/" class="btn">Kembali ke Beranda</a>
			</div>
		</div>
	</body>
</html>
